<!DOCTYPE html>
<html>
<head>
  <title>Products</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar">
    <h2>Inventory</h2>
    <a href="index.html">Dashboard</a>
    <a href="products.html" class="active">Products</a>
    <a href="movements.html">Movements</a>
    <a href="orders.html">Orders</a>
    <a href="suppliers.html">Suppliers</a>
  </div>

  <div class="main">
    <div class="page-header">
      <h2>Products</h2>
      <input type="text" id="search" placeholder="Search products..." onkeyup="filterTable()">
    </div>

    <div class="table-box">
      <table id="productTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Unit</th>
            <th>Threshold</th>
            <th>Current Stock</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="productBody"></tbody>
      </table>
    </div>
  </div>

  <script>
const BASE = 'https://994ae882trial-dev-dev-project-srv.cfapps.us10-001.hana.ondemand.com/odata/v4/inventory';
    let allRows = [];

    async function loadProducts() {
      const [prodRes, movRes] = await Promise.all([
        fetch(`${BASE}/Products`),
        fetch(`${BASE}/StockMovements`)
      ]);

      const products  = prodRes.ok  ? (await prodRes.json()).value  : [];
      const movements = movRes.ok   ? (await movRes.json()).value   : [];

      const stockMap = {};
      products.forEach(p => stockMap[p.ID] = 0);
      movements.forEach(m => {
        if (stockMap[m.product_ID] !== undefined) {
          stockMap[m.product_ID] += m.type === 'IN' ? m.quantity : -m.quantity;
        }
      });

      const tbody = document.getElementById('productBody');
      tbody.innerHTML = '';
      allRows = [];

      products.forEach(p => {
        const stock = stockMap[p.ID] || 0;
        const low   = stock < p.threshold;
        const row   = `
          <tr>
            <td>${p.name}</td>
            <td>${p.category}</td>
            <td>${p.unit}</td>
            <td>${p.threshold}</td>
            <td>${stock}</td>
            <td><span class="badge ${low ? 'badge-danger' : 'badge-success'}">${low ? 'Low Stock' : 'OK'}</span></td>
          </tr>`;
        tbody.innerHTML += row;
        allRows.push(row);
      });
    }

    function filterTable() {
      const q = document.getElementById('search').value.toLowerCase();
      const tbody = document.getElementById('productBody');
      tbody.innerHTML = allRows.filter(r => r.toLowerCase().includes(q)).join('');
    }

    loadProducts();
  </script>
</body>
</html>
