<!DOCTYPE html>
<html>
<head>
  <title>Inventory Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar">
    <h2>Inventory</h2>
    <a href="index.html" class="active">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="movements.html">Movements</a>
    <a href="orders.html">Orders</a>
    <a href="suppliers.html">Suppliers</a>
  </div>

  <div class="main">
    <div class="page-header">
      <h2>Dashboard</h2>
      <button class="btn" onclick="openModal()">+ Add Movement</button>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <p>Total Products</p>
        <h2 id="kpi-total">--</h2>
      </div>
      <div class="kpi-card warning">
        <p>Low Stock Alerts</p>
        <h2 id="kpi-low">--</h2>
      </div>
      <div class="kpi-card">
        <p>Pending Reorders</p>
        <h2 id="kpi-reorders">--</h2>
      </div>
      <div class="kpi-card">
        <p>Warehouses</p>
        <h2 id="kpi-warehouses">--</h2>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-box">
        <h3>Stock levels by product</h3>
        <canvas id="stockChart"></canvas>
      </div>
      <div class="chart-box">
        <h3>Stock movement trend</h3>
        <canvas id="trendChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Add Stock Movement</h3>
      <select id="m-product"></select>
      <select id="m-warehouse"></select>
      <select id="m-type">
        <option value="IN">IN</option>
        <option value="OUT">OUT</option>
      </select>
      <input type="number" id="m-quantity" placeholder="Quantity" min="1">
      <input type="text" id="m-movedBy" placeholder="Your name">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn" onclick="submitMovement()">Submit</button>
      </div>
    </div>
  </div>

<script src="dashboard.js?v=2"></script>
</body>
</html>
